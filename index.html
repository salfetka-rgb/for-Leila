<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Лейлы ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.8s ease;
}

.screen{
    width:90%;
    max-width:600px;
    text-align:center;
    display:none;
    opacity:0;
    transform:translateY(20px);
    transition:0.6s ease;
    filter:blur(10px);
}

.screen.active{
    display:block;
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
}

h1{
    font-size:2.2rem;
    margin-bottom:20px;
}

p{
    font-size:1.1rem;
    color:#ccc;
    line-height:1.6;
}

button{
    background:white;
    color:black;
    border:none;
    padding:14px 28px;
    border-radius:16px;
    cursor:pointer;
    margin:10px;
    font-size:1rem;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:white;
}

.no{
    position:absolute;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
}

.options{
    display:grid;
    gap:10px;
    margin-top:20px;
    text-align:left;
}

.option{
    background:#111;
    padding:12px;
    border-radius:12px;
}

.heart{
    position:fixed;
    color:#ff4d6d;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);opacity:1;}
    to{transform:translateY(-100px);opacity:0;}
}

/* typing */
.typing::after{
    content:"...";
    animation:dots 1s infinite;
}

@keyframes dots{
    0%{content:"";}
    33%{content:".";}
    66%{content:"..";}
    100%{content:"...";}
}
</style>
</head>

<body>

<div class="screen active" id="screen1">
    <h1>Привет, Лейла ❤️</h1>
    <p>У меня есть для тебя один вопрос...</p>
    <button onclick="next(2)">Нажми сюда ✨</button>
</div>

<div class="screen" id="screen2">
    <h1>Пойдёшь со мной на свидание? ❤️</h1>

    <button onclick="next(3)">Да 🥰</button>
    <button class="no" id="noBtn">Нет 🙈</button>
</div>

<div class="screen" id="screen3">
    <h1>Ура ❤️</h1>

    <p>Выбери дату и время</p>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="next(4)">Дальше →</button>
</div>

<div class="screen" id="screen4">
    <h1>Куда пойдём? ✨</h1>

    <div class="options">
        <label class="option"><input type="checkbox"> 🍽️ Ресторан</label>
        <label class="option"><input type="checkbox"> ☕ Кофейня</label>
        <label class="option"><input type="checkbox"> 🎬 Кино</label>
        <label class="option"><input type="checkbox"> 🎮 Кинорум</label>
        <label class="option"><input type="checkbox"> 🌃 Прогулка</label>
        <label class="option"><input type="checkbox"> ✨ Сюрприз</label>
    </div>

    <button onclick="send()">Отправить ❤️</button>
</div>

<div class="screen" id="screen5">
    <h1 class="typing">Отправляем сообщение</h1>
</div>

<div class="screen" id="screen6">
    <h1>❤️ Готово</h1>
    <p>Твой ответ уже у Апельсинчика ✨</p>
</div>

<script>

function next(n){
    document.querySelectorAll('.screen')
        .forEach(s=>s.classList.remove('active'));

    const el=document.getElementById('screen'+n);
    el.classList.add('active');
}

/* NO BUTTON */
const noBtn=document.getElementById('noBtn');

noBtn.addEventListener('mouseenter',()=>{
    const x=Math.random()*200;
    const y=Math.random()*200;
    noBtn.style.transform=`translate(${x}px,${y}px)`;
});

/* hearts */
setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart';
    h.innerHTML='❤';
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(10+Math.random()*20)+'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},500);

/* SEND */
function send(){

    const date=document.getElementById("date").value;
    const time=document.getElementById("time").value;

    if(!date||!time){
        alert("Выбери дату и время ❤️");
        return;
    }

    const places=[];
    document.querySelectorAll('.option input:checked')
        .forEach(e=>places.push(e.parentElement.innerText));

    const msg=
`Привет, Апельсинчик ❤️

Я согласна на свидание 😊

📅 ${date}
⏰ ${time}

Куда:
${places.join('\n')}`;

    next(5);

    setTimeout(()=>{

        const url="https://wa.me/77763103143?text="+encodeURIComponent(msg);

        window.location.href=url;

        setTimeout(()=>{
            next(6);
        },1200);

    },1500);
}

</script>

</body>
</html>
